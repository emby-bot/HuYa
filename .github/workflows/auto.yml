name: 虎牙虎粮自动发放

on:
  schedule:
    # 每天北京时间 00:30 运行，对应 UTC 16:30
    - cron: '30 16 * * *'
  workflow_dispatch:
    inputs:
      rooms:
        description: '房间号，逗号分隔；留空则使用 Secrets 里的 HUYA_ROOMS'
        required: false
        default: ''
      gift_count:
        description: '每个房间最多赠送虎粮数量；留空则使用 Secrets 里的 HUYA_GIFT_COUNT'
        required: false
        default: ''

jobs:
  send-hl:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 缓存 Python 依赖
      - name: 缓存 Python 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 只安装虚拟显示，不安装完整桌面
      - name: 安装虚拟显示
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # 安装依赖
      - name: 安装 Python 包
        run: pip install -r requirements.txt

      # 检查 Cookie
      - name: 检查 HUYA_COOKIE
        run: |
          if [ -z "${{ secrets.HUYA_COOKIE }}" ]; then
            echo "❌ 未配置 HUYA_COOKIE"
            exit 1
          fi

      # 获取房间号
      - name: 获取房间号
        id: get-rooms
        run: |
          if [ -n "${{ github.event.inputs.rooms }}" ]; then
            echo "rooms=${{ github.event.inputs.rooms }}" >> $GITHUB_OUTPUT
          else
            if [ -z "${{ secrets.HUYA_ROOMS }}" ]; then
              echo "❌ 未配置 HUYA_ROOMS"
              exit 1
            fi
            echo "rooms=${{ secrets.HUYA_ROOMS }}" >> $GITHUB_OUTPUT
          fi

      # 获取自定义赠送数量
      - name: 获取虎粮赠送数量
        id: get-gift-count
        run: |
          if [ -n "${{ github.event.inputs.gift_count }}" ]; then
            echo "gift_count=${{ github.event.inputs.gift_count }}" >> $GITHUB_OUTPUT
          else
            echo "gift_count=${{ secrets.HUYA_GIFT_COUNT }}" >> $GITHUB_OUTPUT
          fi

      # 启动虚拟桌面 + 运行脚本
      - name: 运行虎粮发放和打卡
        env:
          HUYA_COOKIE: ${{ secrets.HUYA_COOKIE }}
          HUYA_ROOMS: ${{ steps.get-rooms.outputs.rooms }}
          HUYA_GIFT_COUNT: ${{ steps.get-gift-count.outputs.gift_count }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEADLESS: "true"
          PYTHONUNBUFFERED: "1"
        run: |
          xvfb-run -a python -u main.py
